- slug: "academic-humanize"
  order: 1
  title: "Academic Humanize"
  role: "学术写作后训练"
  category_id: "training"
  category_label: "LLM 后训练"
  status: "Active"
  visibility: "Public"
  year: "2026"
  repo: "https://github.com/haibarazz/academic-humanize"
  demo: ""
  featured: true
  summary: "面向学术英文改写中 AI-like 表达明显、句式模板化、语义保真难控制的问题，构建一套面向 academic writing humanization 的本地后训练流程。"
  impact: "项目以 Qwen2.5-7B-Instruct 为基座，先构造 AI-like draft -> human/reference revision 的 SFT 样本，用 QLoRA 训练低成本 LoRA adapter；随后使用 SFT/DPO 模型自身生成 rejected response，构造 SPIN-style DPO 与迭代 DPO 偏好数据，让模型在保持原意、术语、数字和逻辑关系的前提下减少 AI 写作痕迹。评测侧同时接入 BERTScore、chrF++、BLEU、TER 等语义/编辑距离指标，以及六维 LLM-as-Judge rubric，综合评估语义保真、自然度、术语准确性和编辑价值。"
  tags:
    - "Python"
    - "QLoRA"
    - "DPO"
    - "Qwen2.5"
    - "LLM-as-Judge"
  highlights:
    - "构造 AI-like draft -> human/reference revision 的 SFT 样本"
    - "用模型自身输出构造 SPIN-style DPO 与迭代 DPO 偏好数据"
    - "用语义/编辑距离指标和六维 judge rubric 综合评估"

- slug: "deeplearning-framework"
  order: 2
  title: "ReproFlow"
  role: "AI 论文复现实验框架"
  category_id: "ml"
  category_label: "ML 工程"
  status: "Active"
  visibility: "Public"
  year: "2026"
  repo: "https://github.com/haibarazz/ReproFlow"
  demo: ""
  featured: true
  summary: "面向 AI 辅助论文复现中“模型代码容易生成，但数据结构、训练入口、指标口径、基线方法、随机种子和消融实验难以统一”的问题，构建一个可配置、可扩展的深度学习实验框架。"
  impact: "项目使用 Hydra 将数据、模型、训练器、评估指标和训练循环拆分为独立配置层，通过数据适配器与数据集抽象支持表格数据、推荐系统和图数据等不同输入形态，并提供 doctor 检查数据列、任务类型、训练器和指标是否匹配。论文复现侧提供论文方法脚手架、AI 操作规范和经典论文示例，将论文方法拆解为模型实现、模型配置和训练配置；实验侧支持传统机器学习基线、多随机种子、网格调参、消融实验和统一实验运行器，用一致的数据、指标和随机种子比较论文方法与基线结果。"
  tags:
    - "Python"
    - "PyTorch"
    - "Hydra"
    - "Data Adapter"
    - "AI Reproduction"
  highlights:
    - "用 Hydra 将数据、模型、训练器、指标和训练循环拆成配置层"
    - "通过数据适配器与数据集抽象支持表格、推荐系统和图数据"
    - "支持论文方法脚手架、传统机器学习基线、多随机种子、调参和消融"

